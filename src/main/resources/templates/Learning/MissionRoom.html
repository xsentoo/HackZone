<!DOCTYPE html>
<html lang="fr" xmlns:th="[http://www.thymeleaf.org](http://www.thymeleaf.org)">
<head>
  <meta charset="UTF-8">
  <title>Salle de Mission</title>
  <link href="[https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css](https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css)" rel="stylesheet">
  <style>
    body { background: #0d1117; color: #c9d1d9; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .mission-box { width: 100%; max-width: 800px; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #30363d; padding-bottom: 20px; }
    h1 { margin: 0; color: #58a6ff; font-size: 1.8rem; }
    .close-btn { color: #8b949e; text-decoration: none; font-size: 1.5rem; }
    .briefing { background: #21262d; padding: 25px; border-left: 4px solid #58a6ff; margin-bottom: 40px; border-radius: 0 5px 5px 0; }
    .briefing h3 { margin-top: 0; color: #c9d1d9; }
    .briefing p { line-height: 1.6; color: #8b949e; }
    .action-area { text-align: center; margin-bottom: 40px; }
    .btn-launch { display: inline-block; background: #d29922; color: white; padding: 15px 40px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 1.2rem; transition: 0.3s; }
    .btn-launch:hover { background: #e3b341; transform: scale(1.05); }
    .validation-area { border-top: 1px solid #30363d; padding-top: 30px; text-align: center; }
    input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; width: 300px; border-radius: 5px; margin-right: 10px; }
    button { background: #238636; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    button:hover { background: #2ea043; }
  </style>
</head>
<body>
<div class="mission-box">
  <div class="header">
    <h1 th:text="${challenge.title}">Titre Mission</h1>
    <a th:href="@{'/learn/' + ${challenge.category}}" class="close-btn"><i class="fas fa-times"></i></a>
  </div>

  <div class="briefing">
    <h3><i class="fas fa-terminal"></i> Briefing</h3>
    <p th:text="${challenge.description}">Description...</p>
  </div>

  <div class="action-area">
    <a th:href="${challenge.targetUrl}" target="_blank" class="btn-launch">
      <i class="fas fa-rocket"></i> DÉMARRER L'ENVIRONNEMENT CIBLE
    </a>
    <p style="margin-top: 15px; color: #8b949e; font-size: 0.9rem;">(Ouvre le terminal cible dans un nouvel onglet)</p>
  </div>

  <div class="validation-area">
    <h3 style="color: #c9d1d9; margin-bottom: 20px;">Validation de mission</h3>
    <form action="/validate-flag" method="post">
      <input type="text" name="flagInput" placeholder="Entrez le Flag (ex: FLAG{...})" required>
      <button type="submit">CONFIRMER</button>
    </form>
  </div>
</div>
</body>
</html>
